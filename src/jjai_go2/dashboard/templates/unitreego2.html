<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go2 Dashboard | JustJust.AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    <style>
        :root {
            --bg-primary: #0f0f14;
            --bg-secondary: #16161d;
            --bg-tertiary: #1c1c26;
            --bg-hover: #22222e;
            --border-color: #2a2a3a;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --accent-orange: #f97316;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
        }
        .header-title span { font-size: 24px; }
        .connection-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .connection-badge.online { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
        .connection-badge.offline { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.green { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .dot.red { background: var(--accent-red); }

        /* Layout */
        .main { display: grid; grid-template-columns: 280px 1fr 340px; gap: 0; min-height: calc(100vh - 57px); }

        /* Left Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        /* Status Cards */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
        }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .stat-value { font-size: 18px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
        .stat-value.green { color: var(--accent-green); }
        .stat-value.yellow { color: var(--accent-yellow); }
        .stat-value.red { color: var(--accent-red); }
        .stat-value.blue { color: var(--accent-blue); }

        /* Command Buttons */
        .cmd-section { display: flex; flex-direction: column; gap: 6px; }
        .cmd-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .cmd-btn:hover { background: var(--bg-hover); border-color: var(--accent-blue); }
        .cmd-btn:active { transform: scale(0.97); }
        .cmd-btn .icon { font-size: 16px; width: 20px; text-align: center; }
        .cmd-btn.danger:hover { border-color: var(--accent-red); }

        .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

        /* Center: Camera + Controls */
        .center { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

        .camera-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .camera-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .camera-placeholder {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
        }
        .camera-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* D-Pad Controls */
        .dpad-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 8px;
        }
        .dpad {
            display: grid;
            grid-template-areas: ". up ." "left stop right" ". down .";
            gap: 4px;
        }
        .dpad-btn {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .dpad-btn:hover { background: var(--bg-hover); border-color: var(--accent-blue); }
        .dpad-btn:active { transform: scale(0.93); }
        .dpad-btn.stop { background: var(--accent-red); border-color: var(--accent-red); }
        .dpad-btn.stop:hover { background: #dc2626; }
        .dpad .up { grid-area: up; }
        .dpad .down { grid-area: down; }
        .dpad .left { grid-area: left; }
        .dpad .right { grid-area: right; }
        .dpad .stop { grid-area: stop; }

        /* Rotation controls */
        .rotate-controls { display: flex; gap: 8px; align-items: center; }
        .rotate-btn {
            width: 52px; height: 52px;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .rotate-btn:hover { background: var(--bg-hover); border-color: var(--accent-purple); }

        /* Right Panel: Voice Log */
        .voice-panel {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .voice-log {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        .voice-entry {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
        }
        .voice-entry.user {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid var(--accent-blue);
        }
        .voice-entry.assistant {
            background: rgba(168, 85, 247, 0.1);
            border-left: 3px solid var(--accent-purple);
        }
        .voice-entry.tool {
            background: rgba(6, 182, 212, 0.1);
            border-left: 3px solid var(--accent-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        .voice-role {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .voice-time {
            font-size: 10px;
            color: var(--text-muted);
            float: right;
        }
        .voice-empty {
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            padding: 40px 0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
            animation-fill-mode: forwards;
        }
        .toast.success { background: var(--accent-green); color: #000; }
        .toast.error { background: var(--accent-red); color: #fff; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-title">
            <span>&#x1f415;</span> JJAI Go2 Dashboard
        </div>
        <div id="connection-badge" class="connection-badge offline">
            <div class="dot red" id="conn-dot"></div>
            <span id="conn-text">Connecting...</span>
        </div>
    </div>

    <div class="main">
        <!-- Left Sidebar: Status + Commands -->
        <div class="sidebar">
            <!-- Status -->
            <div>
                <div class="section-title">Status</div>
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-label">Battery</div>
                        <div class="stat-value green" id="stat-battery">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Posture</div>
                        <div class="stat-value blue" id="stat-posture">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">CPU Temp</div>
                        <div class="stat-value" id="stat-temp">--</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Uptime</div>
                        <div class="stat-value" id="stat-uptime">--</div>
                    </div>
                </div>
            </div>

            <!-- Posture Commands -->
            <div>
                <div class="section-title">Posture</div>
                <div class="cmd-section">
                    <button class="cmd-btn" onclick="sendCmd('stand_up')">
                        <span class="icon">&#x2B06;</span> Stand Up
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('sit_down')">
                        <span class="icon">&#x2B07;</span> Sit Down
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('balance_stand')">
                        <span class="icon">&#x2696;</span> Balance
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('recovery_stand')">
                        <span class="icon">&#x1F6E1;</span> Recovery
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('lie_down')">
                        <span class="icon">&#x1F634;</span> Lie Down
                    </button>
                </div>
            </div>

            <!-- Tricks -->
            <div>
                <div class="section-title">Tricks</div>
                <div class="cmd-grid">
                    <button class="cmd-btn" onclick="sendCmd('dance')">
                        <span class="icon">&#x1F483;</span> Dance
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('hello')">
                        <span class="icon">&#x1F44B;</span> Hello
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('stretch')">
                        <span class="icon">&#x1F9D8;</span> Stretch
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('wiggle_hips')">
                        <span class="icon">&#x1F43E;</span> Wiggle
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('shake_hand')">
                        <span class="icon">&#x1F91D;</span> Shake
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('front_flip')">
                        <span class="icon">&#x1F938;</span> Flip
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('climb_stairs')">
                        <span class="icon">&#x1FA9C;</span> Stairs
                    </button>
                    <button class="cmd-btn" onclick="sendCmd('walk_upright')">
                        <span class="icon">&#x1F9CD;</span> Upright
                    </button>
                </div>
            </div>
        </div>

        <!-- Center: Camera + Movement -->
        <div class="center">
            <!-- Camera Feed -->
            <div class="camera-container" id="camera-container">
                <div class="camera-badge">LIVE</div>
                <img id="camera-feed" src="/unitreego2/api/camera" alt="Camera"
                     onerror="this.style.display='none'; document.getElementById('camera-placeholder').style.display='block';">
                <div id="camera-placeholder" class="camera-placeholder" style="display:none;">
                    Camera feed unavailable.<br>Connect the Go2 to start streaming.
                </div>
            </div>

            <!-- D-Pad Movement Controls -->
            <div class="dpad-container">
                <div class="dpad">
                    <button class="dpad-btn up" onclick="sendCmd('move_forward', {distance: 0.5})">&#x2B06;</button>
                    <button class="dpad-btn left" onclick="sendCmd('move_left', {distance: 0.3})">&#x2B05;</button>
                    <button class="dpad-btn stop" onclick="sendCmd('stop')">&#x23F9;</button>
                    <button class="dpad-btn right" onclick="sendCmd('move_right', {distance: 0.3})">&#x27A1;</button>
                    <button class="dpad-btn down" onclick="sendCmd('move_backward', {distance: 0.5})">&#x2B07;</button>
                </div>
                <div class="rotate-controls">
                    <button class="rotate-btn" onclick="sendCmd('rotate', {angle_deg: 45})">&#x21BA;</button>
                    <button class="rotate-btn" onclick="sendCmd('rotate', {angle_deg: -45})">&#x21BB;</button>
                </div>
            </div>
        </div>

        <!-- Right Panel: Voice Log -->
        <div class="voice-panel">
            <div class="section-title">Voice Transcript</div>
            <div class="voice-log" id="voice-log">
                <div class="voice-empty" id="voice-empty">
                    Voice transcript will appear here when the voice agent is active.
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // WebSocket connection
        let ws = null;
        const startTime = Date.now();

        function connectWS() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${proto}//${location.host}/unitreego2/ws`);

            ws.onopen = () => {
                console.log('WebSocket connected');
                updateConnection(true);
            };
            ws.onclose = () => {
                console.log('WebSocket disconnected, reconnecting...');
                updateConnection(false);
                setTimeout(connectWS, 2000);
            };
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'result') {
                    showToast(`${data.command}: OK`, 'success');
                } else if (data.type === 'error') {
                    showToast(`${data.command}: ${data.error}`, 'error');
                }
            };
        }

        function sendCmd(command, args = {}) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ command, args }));
            } else {
                // Fallback to HTTP
                fetch('/unitreego2/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command, args })
                }).then(r => r.json()).then(data => {
                    if (data.success) {
                        showToast(`${command}: OK (${data.duration_ms}ms)`, 'success');
                    } else {
                        showToast(`${command}: ${data.error}`, 'error');
                    }
                }).catch(e => showToast(`Error: ${e}`, 'error'));
            }
        }

        function updateConnection(online) {
            const badge = document.getElementById('connection-badge');
            const dot = document.getElementById('conn-dot');
            const text = document.getElementById('conn-text');
            if (online) {
                badge.className = 'connection-badge online';
                dot.className = 'dot green';
                text.textContent = 'Connected';
            } else {
                badge.className = 'connection-badge offline';
                dot.className = 'dot red';
                text.textContent = 'Disconnected';
            }
        }

        // SSE: Status updates
        const statusSource = new EventSource('/unitreego2/api/stream/status');
        statusSource.onmessage = (event) => {
            const d = JSON.parse(event.data);
            document.getElementById('stat-battery').textContent = d.connected ? d.battery + '%' : '--';
            document.getElementById('stat-posture').textContent = d.connected ? d.posture : '--';

            const tempEl = document.getElementById('stat-temp');
            if (d.connected && d.cpu_temp > 0) {
                tempEl.textContent = d.cpu_temp + '°C';
                tempEl.className = 'stat-value ' + (d.cpu_temp > 70 ? 'red' : d.cpu_temp > 50 ? 'yellow' : 'green');
            } else {
                tempEl.textContent = '--';
            }

            // Uptime
            const upSec = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(upSec / 60);
            const secs = upSec % 60;
            document.getElementById('stat-uptime').textContent = `${mins}m ${secs}s`;

            // Battery color
            const batEl = document.getElementById('stat-battery');
            if (d.connected) {
                batEl.className = 'stat-value ' + (d.battery < 20 ? 'red' : d.battery < 50 ? 'yellow' : 'green');
            }

            updateConnection(d.connected);
        };

        // SSE: Voice transcript
        const voiceSource = new EventSource('/unitreego2/api/stream/voice');
        voiceSource.onmessage = (event) => {
            const d = JSON.parse(event.data);
            const log = document.getElementById('voice-log');
            const empty = document.getElementById('voice-empty');
            if (empty) empty.style.display = 'none';

            const entry = document.createElement('div');
            let cls = d.role === 'user' ? 'user' : d.tool ? 'tool' : 'assistant';
            entry.className = `voice-entry ${cls}`;
            entry.innerHTML = `
                <div class="voice-role">${d.role}${d.tool ? ' → ' + d.tool : ''}<span class="voice-time">${d.time}</span></div>
                ${d.text}
            `;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        };

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch(e.key) {
                case 'ArrowUp': case 'w': sendCmd('move_forward', {distance: 0.3}); break;
                case 'ArrowDown': case 's': sendCmd('move_backward', {distance: 0.3}); break;
                case 'ArrowLeft': case 'a': sendCmd('rotate', {angle_deg: 30}); break;
                case 'ArrowRight': case 'd': sendCmd('rotate', {angle_deg: -30}); break;
                case ' ': e.preventDefault(); sendCmd('stop'); break;
                case 'q': sendCmd('move_left', {distance: 0.2}); break;
                case 'e': sendCmd('move_right', {distance: 0.2}); break;
            }
        });

        // Start WebSocket
        connectWS();
    </script>
</body>
</html>
